name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar código
        run: dart analyze --fatal-infos

      - name: Rodar testes com cobertura
        run: flutter test --coverage

      - name: Verificar threshold de cobertura (mínimo 50%)
        run: |
          sudo apt-get install -y lcov --quiet
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 \
            | grep -oP 'lines\.*: \K[\d.]+(?=%)' | head -1)
          echo "Cobertura de linhas: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}')
          threshold = 50.0
          if cov < threshold:
              raise SystemExit(f'Cobertura {cov:.1f}% abaixo do mínimo {threshold}%')
          print(f'OK — cobertura {cov:.1f}% >= {threshold}%')
          "

      - name: Publicar relatório de cobertura (Codecov)
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build APK debug
        run: flutter build apk --debug --no-pub
